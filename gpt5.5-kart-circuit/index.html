<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPT Kart Circuit</title>
  </head>
  <body>
    <main id="app">
      <canvas id="game-canvas" aria-label="Three.js arcade kart racing game"></canvas>
      <section class="hud" aria-live="polite">
        <div class="status">
          <span class="label">Lap</span>
          <strong id="lap-value">1 / 3</strong>
        </div>
        <div class="status">
          <span class="label">Speed</span>
          <strong id="speed-value">0</strong>
        </div>
        <div class="status">
          <span class="label">Time</span>
          <strong id="time-value">00.00</strong>
        </div>
        <div class="status">
          <span class="label">Boost</span>
          <strong id="boost-value">Ready</strong>
        </div>
      </section>
      <section class="prompt" id="prompt">
        <strong>GPT Kart Circuit</strong>
        <span>WASD / Arrow keys drive · Space drift · R reset</span>
      </section>
      <section class="touch-controls" aria-label="Touch drive controls">
        <button type="button" data-drive="left" aria-label="Steer left">Left</button>
        <button type="button" data-drive="gas" aria-label="Accelerate">Gas</button>
        <button type="button" data-drive="right" aria-label="Steer right">Right</button>
        <button type="button" data-drive="drift" aria-label="Drift">Drift</button>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
