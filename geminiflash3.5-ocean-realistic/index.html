<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini 3D Realistic Ocean Simulation</title>
  <!-- 引入现代字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <!-- WebGL Canvas 容器 -->
  <div id="canvas-container"></div>

  <!-- UI 玻璃拟态控制台 -->
  <div class="glass-panel" id="control-panel">
    <header>
      <div class="brand">
        <span class="icon">✦</span>
        <h1>Gemini Ocean</h1>
      </div>
      <p class="subtitle">3D Real-time Gerstner Wave Simulator</p>
    </header>

    <!-- 天气/时段快捷预设 -->
    <section class="control-group">
      <h3>天气与时段预设</h3>
      <div class="preset-grid">
        <button class="preset-btn active" id="preset-noon" data-preset="noon">
          <span class="btn-icon">☀️</span>正午阳光
        </button>
        <button class="preset-btn" id="preset-sunset" data-preset="sunset">
          <span class="btn-icon">🌅</span>金色黄昏
        </button>
        <button class="preset-btn" id="preset-moonlight" data-preset="moonlight">
          <span class="btn-icon">🌙</span>静谧月夜
        </button>
        <button class="preset-btn" id="preset-storm" data-preset="storm">
          <span class="btn-icon">⛈️</span>雷暴海啸
        </button>
      </div>
    </section>

    <!-- 仿真参数调节 -->
    <section class="control-group">
      <h3>海面参数细节</h3>
      
      <div class="slider-row">
        <div class="slider-label">
          <span>风速 (Wind Speed)</span>
          <span class="value-display" id="val-windSpeed">18.0</span>
        </div>
        <input type="range" id="slider-windSpeed" min="2" max="42" step="0.5" value="18">
      </div>

      <div class="slider-row">
        <div class="slider-label">
          <span>浪高 (Swell Height)</span>
          <span class="value-display" id="val-swellHeight">1.8</span>
        </div>
        <input type="range" id="slider-swellHeight" min="0.1" max="3.5" step="0.05" value="1.8">
      </div>

      <div class="slider-row">
        <div class="slider-label">
          <span>波浪陡度 (Steepness / Choppiness)</span>
          <span class="value-display" id="val-choppiness">1.25</span>
        </div>
        <input type="range" id="slider-choppiness" min="0.2" max="2.2" step="0.05" value="1.25">
      </div>

      <div class="slider-row">
        <div class="slider-label">
          <span>泡沫覆盖率 (Foam Amount)</span>
          <span class="value-display" id="val-foamAmount">0.5</span>
        </div>
        <input type="range" id="slider-foamAmount" min="0" max="1" step="0.02" value="0.5">
      </div>
    </section>

    <!-- 浮力与交互操作 -->
    <section class="control-group">
      <h3>物理浮力交互</h3>
      <p class="info-text">💡 点击海面任意位置，可以直接在水面投下一颗受实时浮力作用的小球！</p>
      <div class="button-row">
        <button class="action-btn" id="btn-spawn-ball">投下一颗球</button>
        <button class="action-btn secondary" id="btn-clear-balls">清空浮物</button>
      </div>
    </section>

    <!-- 状态监控面板 -->
    <footer>
      <div class="stats-row">
        <div class="stat-item">
          <span class="stat-label">FPS</span>
          <span class="stat-val" id="stat-fps">--</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">浮体数量</span>
          <span class="stat-val" id="stat-balls">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">CPU 仿真延迟</span>
          <span class="stat-val" id="stat-cpu">0.0 ms</span>
        </div>
      </div>
    </footer>
  </div>

  <!-- 主逻辑入口 -->
  <script type="module" src="./src/main.js"></script>
</body>
</html>
