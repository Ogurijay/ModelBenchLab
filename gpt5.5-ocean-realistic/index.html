<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPT 真实海面模拟</title>
  </head>
  <body>
    <main id="app">
      <section class="viewport" aria-label="Three.js 真实海面模拟">
        <canvas id="ocean-canvas"></canvas>
        <div class="hud" aria-live="polite">
          <div>
            <span class="label">版本</span>
            <strong id="storm-profile">电影风暴</strong>
          </div>
          <div>
            <span class="label">海况</span>
            <strong id="sea-state">风暴海况</strong>
          </div>
          <div>
            <span class="label">帧率</span>
            <strong id="fps-value">--</strong>
          </div>
          <div>
            <span class="label">顶点数</span>
            <strong id="vertex-count">--</strong>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
